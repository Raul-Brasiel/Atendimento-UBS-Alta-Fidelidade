<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Sistema de Saúde</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/login.css">
    <style>
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <header class="w-full bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <div class="flex items-center select-none text-2xl font-bold text-blue-900">
            gov.br
        </div>
    </header>
    
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md mx-auto bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-gray-100 transition-all hover:shadow-[0_8px_30px_rgb(0,0,0,0.12)] fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-600 mb-4">
                    <i class="fas fa-shield-halved text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Acesse sua conta</h2>
                <p class="text-gray-500 text-sm mt-2">Portal de Serviços da Saúde</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">CPF</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-id-card text-gray-400"></i>
                        </div>
                        <input type="text" value="123.456.789-00" name="login" class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all bg-gray-50 focus:bg-white text-gray-700" required>
                    </div>
                </div>
                <div class="mb-8">
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" value="senha123" name="senha" class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all bg-gray-50 focus:bg-white text-gray-700" required>
                    </div>
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-3">
                    <span>Entrar de forma segura</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
            
            <div class="mt-8 text-center pt-6 border-t border-gray-100">
                <a href="#" class="text-sm text-blue-600 font-semibold hover:text-blue-800 hover:underline transition-colors">Precisa de ajuda para entrar?</a>
            </div>
        </div>
    </main>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');
            const span = btn.querySelector('span');
            
            // Simular loading
            span.textContent = 'Autenticando...';
            loader.style.display = 'block';
            btn.classList.add('opacity-90', 'cursor-wait');
            
            setTimeout(() => {
                window.location.href = 'pagina_paciente.html';
            }, 1200);
        }
    </script>
</body>
</html>
